apiVersion: 1

policies:
  - orgId: 1
    receiver: Intellidog Webhook
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: Intellidog Webhook
        matchers:
          - severity =~ "critical|high"
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m
